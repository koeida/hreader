<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layout 4 — Compact Popover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  .srs-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    user-select: none;
  }
  .queue-label { font-size: 13px; color: #555; }
  .flip-card-mock {
    width: 340px; height: 200px;
    background: #2a2a2a; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px; border: 1px solid #333;
  }
  .srs-controls-mock { display: flex; gap: 16px; }
  .btn-mock { padding: 10px 28px; border-radius: 8px; background: #333; border: 1px solid #444; color: #888; font-size: 14px; }

  /* Postpone button — bottom-right corner, small */
  .postpone-anchor {
    position: fixed;
    bottom: 28px; right: 28px;
  }

  .postpone-trigger {
    font-size: 12px; color: #666;
    background: #222; border: 1px solid #333;
    border-radius: 8px; padding: 7px 14px;
    cursor: pointer; display: block;
  }

  /* Popover above the button */
  .popover {
    position: absolute;
    bottom: calc(100% + 10px);
    right: 0;
    width: 300px;
    background: #252525;
    border: 1px solid #363636;
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  /* Arrow pointing down toward button */
  .popover::after {
    content: '';
    position: absolute;
    bottom: -7px; right: 22px;
    width: 12px; height: 12px;
    background: #252525;
    border-right: 1px solid #363636;
    border-bottom: 1px solid #363636;
    transform: rotate(45deg);
  }

  .popover-title {
    font-size: 13px; font-weight: 600;
    margin-bottom: 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .popover-title span { color: #777; font-weight: 400; font-size: 12px; }

  /* Big number readout */
  .readout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
    background: #1c1c1c;
    border-radius: 8px;
    padding: 12px;
  }
  .num { font-size: 32px; font-weight: 700; line-height: 1; }
  .num.before { color: #d96060; }
  .num.after { color: #60c07a; }
  .arrow { font-size: 16px; color: #444; }
  .lbl { font-size: 10px; color: #555; text-align: center; margin-top: 3px; }

  .slider-section { margin-bottom: 14px; }
  .slider-label { font-size: 11px; color: #888; display: flex; justify-content: space-between; margin-bottom: 8px; }
  .slider-label strong { color: #ddd; }
  input[type=range] { width: 100%; accent-color: #5b8dd9; cursor: pointer; }
  .ticks { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-top: 3px; }

  .popover-actions { display: flex; gap: 8px; }
  .btn-cancel { flex: 1; padding: 8px; border-radius: 7px; background: none; border: 1px solid #383838; color: #888; font-size: 12px; cursor: pointer; }
  .btn-confirm { flex: 2; padding: 8px; border-radius: 7px; background: #4a72bb; border: none; color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="srs-view">
  <div class="queue-label">47 cards due</div>
  <div class="flip-card-mock">שָׁלוֹם</div>
  <div class="srs-controls-mock">
    <div class="btn-mock">Wrong</div>
    <div class="btn-mock">Right</div>
  </div>
</div>

<!-- Anchor in corner -->
<div class="postpone-anchor">

  <!-- Popover -->
  <div class="popover">
    <div class="popover-title">
      Postpone reviews
      <span>push due cards forward</span>
    </div>

    <div class="readout">
      <div>
        <div class="num before">47</div>
        <div class="lbl">now</div>
      </div>
      <div class="arrow">→</div>
      <div>
        <div class="num after">12</div>
        <div class="lbl">after</div>
      </div>
    </div>

    <div class="slider-section">
      <div class="slider-label">Shift by <strong>5 days</strong></div>
      <input type="range" min="1" max="30" value="5">
      <div class="ticks"><span>1d</span><span>10d</span><span>20d</span><span>30d</span></div>
    </div>

    <div class="popover-actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-confirm">Postpone 35 cards</button>
    </div>
  </div>

  <button class="postpone-trigger">Postpone…</button>
</div>

</body>
</html>
