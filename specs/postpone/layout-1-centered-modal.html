<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Layout 1 — Centered Modal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

  /* SRS view background (context) */
  .srs-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    filter: blur(2px);
    opacity: 0.4;
    user-select: none;
  }
  .flip-card-mock {
    width: 340px; height: 200px;
    background: #2a2a2a; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px; border: 1px solid #333;
  }
  .srs-controls-mock { display: flex; gap: 16px; }
  .btn-mock { padding: 10px 28px; border-radius: 8px; background: #333; border: 1px solid #444; color: #888; font-size: 14px; }
  .postpone-btn-mock { position: fixed; bottom: 24px; right: 24px; font-size: 12px; color: #555; background: none; border: 1px solid #333; border-radius: 6px; padding: 6px 12px; }

  /* Overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
  }

  /* Dialog */
  .dialog {
    background: #242424;
    border: 1px solid #383838;
    border-radius: 14px;
    padding: 32px;
    width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .dialog h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .dialog p { font-size: 13px; color: #888; margin-bottom: 28px; line-height: 1.5; }

  .readout {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
  }
  .readout .before { color: #e05c5c; font-weight: 600; font-size: 22px; }
  .readout .arrow { color: #555; font-size: 18px; }
  .readout .after { color: #5ce07a; font-weight: 600; font-size: 22px; }
  .readout .label { color: #666; font-size: 12px; }

  .slider-row { margin-bottom: 10px; }
  .slider-row label { font-size: 13px; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 10px; }
  .slider-row label span { color: #fff; font-weight: 600; }
  input[type=range] {
    width: 100%; accent-color: #5b8dd9;
    height: 4px; cursor: pointer;
  }
  .slider-ticks { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-top: 4px; margin-bottom: 28px; }

  .actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { padding: 9px 20px; border-radius: 8px; background: none; border: 1px solid #404040; color: #aaa; font-size: 14px; cursor: pointer; }
  .btn-confirm { padding: 9px 20px; border-radius: 8px; background: #5b8dd9; border: none; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }

  .label-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- SRS view behind (blurred for context) -->
<div class="srs-view">
  <div class="flip-card-mock">שָׁלוֹם</div>
  <div class="srs-controls-mock">
    <div class="btn-mock">Wrong</div>
    <div class="btn-mock">Right</div>
  </div>
</div>
<div class="postpone-btn-mock">Postpone</div>

<!-- Modal overlay -->
<div class="overlay">
  <div class="dialog">
    <h2>Postpone Reviews</h2>
    <p>Push due cards forward by a few days. Use when your queue feels unmanageable.</p>

    <div class="readout">
      <div>
        <div class="before">47</div>
        <div class="label">due today</div>
      </div>
      <div class="arrow">→</div>
      <div>
        <div class="after">12</div>
        <div class="label">due today</div>
      </div>
    </div>

    <div class="slider-row">
      <label>
        Postpone by
        <span>5 days</span>
      </label>
      <input type="range" min="1" max="30" value="5">
      <div class="slider-ticks"><span>1</span><span>10</span><span>20</span><span>30</span></div>
    </div>

    <div class="actions">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-confirm">Postpone 35 cards</button>
    </div>
  </div>
</div>

</body>
</html>
